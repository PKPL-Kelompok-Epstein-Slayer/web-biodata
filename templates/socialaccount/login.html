{% load socialaccount %}

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Login Kelompok</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
        }
        .btn-google {
            background-color: #a02c22;
            color: #ffffff;
            padding: 10px 20px;
            border: none;   
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin-top: 15px;
            font-weight: bold;
        }
        .btn-google:hover {
            background-color: #c23321;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>Masuk ke Web Biodata</h2>
        <p>Silakan masuk menggunakan akun Google Anda.</p>
        
        <form method="post" action="{% provider_login_url 'google' %}">
            {% csrf_token %}
            <button type="submit" class="btn-google"> Lanjutkan dengan Google</button>
        </form>
    </div>

</body>
</html>
