name: CI

on:
  push:
    branches: [ "main", "staging" ]
  pull_request:
    branches: [ "main", "staging" ]

jobs:
  build-test-scan:
    runs-on: ubuntu-latest
    
    # Menarik variabel rahasia dari GitHub Secrets agar aman
    env:
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Wajib 0 agar SonarCloud bisa membaca seluruh riwayat commit

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12' # Sesuaikan jika Anda memakai versi Python yang berbeda
          cache: 'pip'

      - name: Install Dependencies & Tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Menginstal alat tambahan untuk Linting dan Code Coverage
          pip install flake8 pytest pytest-django pytest-cov

      - name: Run Checkstyle / Linter (Flake8)
        run: |
          # Mengecek standar penulisan Python, abaikan folder env/ atau venv/
          flake8 . --exclude=env,venv,migrations --count --show-source --statistics

      - name: Run Unit Tests & Code Coverage
        run: |
          # Menjalankan test dan membuat laporan coverage.xml (pengganti Jacoco)
          pytest --cov=. --cov-report=xml

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Disediakan otomatis oleh GitHub
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}   # Harus diisi di GitHub Secrets
        with:
          args: >
            -Dsonar.projectKey=PKPL-Kelompok-Epstein-Slayer_web-biodata
            -Dsonar.organization=pkpl-kelompok-epstein-slayer
            -Dsonar.python.coverage.reportPaths=coverage.xml
            -Dsonar.exclusions=**/migrations/**,env/**,venv/**,manage.py